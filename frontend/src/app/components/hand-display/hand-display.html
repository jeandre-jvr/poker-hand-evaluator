<div class="hand-display">
<h3>Your Hand ({{ cards().length }}/5)</h3>

<div class="cards">
    @for (card of cards(); track $index) {
    <div class="card" [class.red]="isRed(card.suit)">
        <span class="card-rank">{{ card.rank }}</span>
        <span class="card-suit">{{ suitSymbol(card.suit) }}</span>
        @if (mode() === 'pick') {
        <button class="card-remove" (click)="removeCard.emit($index)">✕</button>
        }
    </div>
    }
</div>
</div>
